  #     POSTGRES_USER: c2d
  #     POSTGRES_PASSWORD: c2d
  #     POSTGRES_DB: c2d
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   restart: unless-stopped

volumes:
  qdrant_data:
