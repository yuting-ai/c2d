# ══════════════════════════════════════
# c2d — External Services (Development)
# ══════════════════════════════════════
# Only Qdrant runs in Docker during development.
# Python backend and Node frontend run natively via conda + pnpm.
#
# Usage:
#   docker-compose up -d          # Start Qdrant
#   conda activate c2d && uvicorn backend.api.main:app --reload
#   cd frontend && pnpm dev

services:
  qdrant:
    image: qdrant/qdrant:v1.14.0
    container_name: c2d-qdrant
    ports:
      - "6333:6333"     # REST API
      - "6334:6334"     # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

  # ── PostgreSQL (cloud version only, uncomment when needed) ──
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: c2d-postgres
  #   ports:
  #     - "5432:5432"
