# ══════════════════════════════════════
# c2d — Conda Environment
# ══════════════════════════════════════
# Create:  conda env create -f environment.yml
# Update:  conda env update -f environment.yml --prune
# Activate: conda activate c2d

name: c2d
channels:
  - defaults

dependencies:
  - python=3.12
  - pip
  - pip:
      - -e ".[dev]"    # Install project + dev dependencies from pyproject.toml
